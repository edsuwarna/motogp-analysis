services:
  api:
    build: .
    container_name: motogp-api
    ports:
      - "8001:8001"
    environment:
      - MOTOGP_DB=/data/motogp.db
    volumes:
      - motogp_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  motogp_data:
